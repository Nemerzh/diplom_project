apiVersion: v1
kind: Namespace
metadata:
  name: energy
---
apiVersion: v1
kind: Secret
metadata:
  name: energy-secrets
  namespace: energy
type: Opaque
stringData:
  POSTGRES_DB: energy
  POSTGRES_USER: energy
  POSTGRES_PASSWORD: energy
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: energy
spec:
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          envFrom:
            - secretRef: { name: energy-secrets }
          ports:
            - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: energy
spec:
  selector: { app: postgres }
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: energy
spec:
  replicas: 2
  selector:
    matchLabels: { app: backend }
  template:
    metadata:
      labels: { app: backend }
    spec:
      containers:
        - name: backend
          image: energy-backend:latest
          env:
            - name: DATABASE_URL
              value: postgresql+psycopg2://energy:energy@postgres:5432/energy
            - name: CORS_ORIGINS
              value: http://localhost
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet: { path: /ready, port: 8000 }
            initialDelaySeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 15
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: energy
spec:
  selector: { app: backend }
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: energy
spec:
  replicas: 1
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      containers:
        - name: frontend
          image: energy-frontend:latest
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: energy
spec:
  selector: { app: frontend }
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: energy-ingress
  namespace: energy
spec:
  rules:
    - host: energy.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port: { number: 8000 }
          - path: /ui
            pathType: Prefix
            backend:
              service:
                name: frontend
                port: { number: 80 }
