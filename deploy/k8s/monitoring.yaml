apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    kubernetes.io/metadata.name: monitoring

# ───────────────────────── RBAC: Prometheus ─────────────────────────────
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/metrics", "nodes/proxy", "services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions", "networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics", "/metrics/cadvisor"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: monitoring

# ───────────────────────── RBAC: kube-state-metrics ─────────────────────
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-state-metrics
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kube-state-metrics
rules:
  - apiGroups: [""]
    resources:
      - configmaps
      - secrets
      - nodes
      - pods
      - services
      - resourcequotas
      - replicationcontrollers
      - limitranges
      - persistentvolumeclaims
      - persistentvolumes
      - namespaces
      - endpoints
    verbs: ["list", "watch"]
  - apiGroups: ["apps"]
    resources: ["statefulsets", "daemonsets", "deployments", "replicasets"]
    verbs: ["list", "watch"]
  - apiGroups: ["batch"]
    resources: ["cronjobs", "jobs"]
    verbs: ["list", "watch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies", "ingresses"]
    verbs: ["list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses", "volumeattachments"]
    verbs: ["list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kube-state-metrics
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kube-state-metrics
subjects:
  - kind: ServiceAccount
    name: kube-state-metrics
    namespace: monitoring

# ───────────────────────── Prometheus ConfigMap ─────────────────────────
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]

      - job_name: backend
        metrics_path: /metrics
        kubernetes_sd_configs:
          - role: endpoints
            namespaces: { names: [energy] }
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name]
            action: keep
            regex: backend

      - job_name: simulator
        metrics_path: /metrics
        kubernetes_sd_configs:
          - role: pod
            namespaces: { names: [energy] }
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: simulator
          - source_labels: [__meta_kubernetes_pod_container_port_number]
            action: keep
            regex: "8010"

      - job_name: node-exporter
        kubernetes_sd_configs:
          - role: endpoints
            namespaces: { names: [monitoring] }
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name]
            action: keep
            regex: node-exporter

      - job_name: cadvisor
        kubernetes_sd_configs:
          - role: endpoints
            namespaces: { names: [monitoring] }
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name]
            action: keep
            regex: cadvisor

      - job_name: kube-state-metrics
        kubernetes_sd_configs:
          - role: endpoints
            namespaces: { names: [monitoring] }
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name]
            action: keep
            regex: kube-state-metrics

# ───────────────────────── Prometheus Deployment ────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
  labels: { app: prometheus }
spec:
  replicas: 1
  selector:
    matchLabels: { app: prometheus }
  template:
    metadata:
      labels: { app: prometheus }
    spec:
      serviceAccountName: prometheus
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=2h
            - --web.enable-lifecycle
          ports:
            - containerPort: 9090
          env:
            - { name: TZ, value: Europe/Kyiv }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: config, mountPath: /etc/prometheus }
            - { name: data,   mountPath: /prometheus }
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
      volumes:
        - name: config
          configMap: { name: prometheus-config }
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
spec:
  type: NodePort
  selector: { app: prometheus }
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30090

# ───────────────────────── node-exporter (DaemonSet) ────────────────────
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-exporter
  namespace: monitoring
  labels: { app: node-exporter }
spec:
  selector:
    matchLabels: { app: node-exporter }
  template:
    metadata:
      labels: { app: node-exporter }
    spec:
      hostNetwork: true
      hostPID: true
      tolerations:
        - effect: NoSchedule
          operator: Exists
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: node-exporter
          image: prom/node-exporter:v1.8.2
          args:
            - --path.procfs=/host/proc
            - --path.sysfs=/host/sys
            - --path.rootfs=/host/root
            - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|rootfs/var/lib/docker)($|/)
            - --web.listen-address=:9100
          ports:
            - { name: metrics, containerPort: 9100, hostPort: 9100 }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: proc,    mountPath: /host/proc, readOnly: true }
            - { name: sys,     mountPath: /host/sys,  readOnly: true }
            - { name: rootfs,  mountPath: /host/root, readOnly: true, mountPropagation: HostToContainer }
          resources:
            requests: { cpu: "20m", memory: "32Mi" }
            limits:   { cpu: "200m", memory: "128Mi" }
      volumes:
        - { name: proc,   hostPath: { path: /proc } }
        - { name: sys,    hostPath: { path: /sys } }
        - { name: rootfs, hostPath: { path: / } }
---
apiVersion: v1
kind: Service
metadata:
  name: node-exporter
  namespace: monitoring
  labels: { app: node-exporter }
spec:
  clusterIP: None
  selector: { app: node-exporter }
  ports:
    - { name: metrics, port: 9100, targetPort: 9100 }

# ───────────────────────── cAdvisor (DaemonSet) ─────────────────────────
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cadvisor
  namespace: monitoring
  labels: { app: cadvisor }
spec:
  selector:
    matchLabels: { app: cadvisor }
  template:
    metadata:
      labels: { app: cadvisor }
    spec:
      tolerations:
        - effect: NoSchedule
          operator: Exists
      automountServiceAccountToken: false
      containers:
        - name: cadvisor
          image: gcr.io/cadvisor/cadvisor:v0.49.1
          args:
            - --housekeeping_interval=10s
            - --docker_only=true
            - --store_container_labels=false
          ports:
            - { name: metrics, containerPort: 8080 }
          securityContext:
            # cAdvisor вимагає привілейованого доступу до системних шляхів (cgroup, dev/disk).
            privileged: true
          volumeMounts:
            - { name: rootfs,    mountPath: /rootfs,        readOnly: true }
            - { name: var-run,   mountPath: /var/run,       readOnly: false }
            - { name: sys,       mountPath: /sys,           readOnly: true }
            - { name: docker,    mountPath: /var/lib/docker, readOnly: true }
            - { name: disk,      mountPath: /dev/disk,      readOnly: true }
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits:   { cpu: "300m", memory: "256Mi" }
      volumes:
        - { name: rootfs,  hostPath: { path: / } }
        - { name: var-run, hostPath: { path: /var/run } }
        - { name: sys,     hostPath: { path: /sys } }
        - { name: docker,  hostPath: { path: /var/lib/docker } }
        - { name: disk,    hostPath: { path: /dev/disk } }
---
apiVersion: v1
kind: Service
metadata:
  name: cadvisor
  namespace: monitoring
  labels: { app: cadvisor }
spec:
  clusterIP: None
  selector: { app: cadvisor }
  ports:
    - { name: metrics, port: 8080, targetPort: 8080 }

# ───────────────────────── kube-state-metrics ───────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-state-metrics
  namespace: monitoring
  labels: { app: kube-state-metrics }
spec:
  replicas: 1
  selector:
    matchLabels: { app: kube-state-metrics }
  template:
    metadata:
      labels: { app: kube-state-metrics }
    spec:
      serviceAccountName: kube-state-metrics
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: kube-state-metrics
          image: registry.k8s.io/kube-state-metrics/kube-state-metrics:v2.13.0
          ports:
            - { name: http-metrics, containerPort: 8080 }
            - { name: telemetry,    containerPort: 8081 }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          resources:
            requests: { cpu: "30m", memory: "64Mi" }
            limits:   { cpu: "200m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: kube-state-metrics
  namespace: monitoring
  labels: { app: kube-state-metrics }
spec:
  selector: { app: kube-state-metrics }
  ports:
    - { name: http-metrics, port: 8080, targetPort: 8080 }
    - { name: telemetry,    port: 8081, targetPort: 8081 }

# ───────────────────────── Grafana ──────────────────────────────────────
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-credentials
  namespace: monitoring
type: Opaque
stringData:
  GF_SECURITY_ADMIN_USER: admin
  GF_SECURITY_ADMIN_PASSWORD: admin
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  datasource.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.monitoring.svc.cluster.local:9090
        isDefault: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  namespace: monitoring
data:
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: energy-dashboards
        orgId: 1
        folder: Energy
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards
# Сам JSON дашбордів вантажиться у ConfigMap `grafana-dashboards-json`
# у `infra/local/kind/up.sh` через `kubectl create configmap --from-file=monitoring/grafana/dashboards/`,
# щоб не дублювати JSON в YAML і автоматично підхоплювати зміни.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
  labels: { app: grafana }
spec:
  replicas: 1
  selector:
    matchLabels: { app: grafana }
  template:
    metadata:
      labels: { app: grafana }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 472
        runAsGroup: 472
        fsGroup: 472
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: grafana
          image: grafana/grafana:11.2.0
          envFrom:
            - secretRef: { name: grafana-credentials }
          env:
            - { name: TZ,                                  value: Europe/Kyiv }
            - { name: GF_DATE_FORMATS_DEFAULT_TIMEZONE,    value: Europe/Kyiv }
          ports:
            - { containerPort: 3000 }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: data,        mountPath: /var/lib/grafana }
            - { name: datasources, mountPath: /etc/grafana/provisioning/datasources }
            - { name: dashprov,    mountPath: /etc/grafana/provisioning/dashboards }
            - { name: dashjson,    mountPath: /var/lib/grafana/dashboards }
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
      volumes:
        - { name: data,        emptyDir: {} }
        - name: datasources
          configMap: { name: grafana-datasources }
        - name: dashprov
          configMap: { name: grafana-dashboards-provider }
        - name: dashjson
          configMap: { name: grafana-dashboards-json, optional: true }
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
spec:
  type: NodePort
  selector: { app: grafana }
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30030
