apiVersion: apps/v1
kind: Deployment
metadata:
  name: simulator
  namespace: energy
  labels: { app: simulator, app.kubernetes.io/component: simulator }
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels: { app: simulator }
  template:
    metadata:
      labels: { app: simulator }
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: simulator
          image: energy-simulator:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - { name: API_URL,           value: "http://backend:8000" }
            - { name: SIM_AUTOSTART,     value: "1" }
            - { name: SIM_CONFIG_PATH,   value: "/app/config/scenario.yaml" }
            - { name: LOG_LEVEL,         value: "INFO" }
            - { name: METER_IDS,         value: "1,2,3" }
            - { name: INTERVAL_SECONDS,  value: "1" }
            - { name: SIM_PROFILE,       value: "normal" }
            - { name: SIM_MULTIPLIER,    value: "1" }
            - { name: TZ,                value: "Europe/Kyiv" }
          ports:
            # Метрики Prometheus симулятора (httpx + custom Counter/Histogram).
            - { name: metrics, containerPort: 8010 }
          volumeMounts:
            - name: scenario
              mountPath: /app/config
              readOnly: true
            - { name: tmp, mountPath: /tmp }
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits:   { cpu: "300m", memory: "256Mi" }
      volumes:
        - name: scenario
          configMap:
            name: simulator-scenario
        - name: tmp
          emptyDir: { medium: Memory, sizeLimit: 32Mi }
