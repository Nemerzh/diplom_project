apiVersion: batch/v1
kind: Job
metadata:
  name: backend-migrate-once
  namespace: energy
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 3
  template:
    metadata:
      labels: { app: backend-migrate }
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: energy-backend:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          command: ["alembic", "upgrade", "head"]
          env:
            - name: DATABASE_URL
              value: postgresql+psycopg2://energy:energy@postgres:5432/energy
            - name: TZ
              value: Europe/Kyiv
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: tmp
          emptyDir: { medium: Memory, sizeLimit: 32Mi }
