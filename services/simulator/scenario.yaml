# Конфігурація симулятора навантаження (кВт·год за інтервал).
# ENV перекриває окремі поля, якщо задані (див. config_loader).

defaults:
  interval_seconds: 2
  jitter_fraction: 0.12
  meters_refresh_seconds: 30
  # Глобальний режим: normal | peak | critical | offline
  global_profile: normal
  multiplier: 1.0
  # Згладжування «потужності» між тиками (0 — лише шум, 1 — миттєво за шаблоном)
  smoothing_alpha: 0.38
  post:
    max_retries: 4
    backoff_seconds: 0.4
    backoff_multiplier: 2.0

events:
  spike_probability: 0.022
  spike_factor_min: 1.12
  spike_factor_max: 1.5
  offline:
    probability_per_tick: 0.0004
    duration_min_seconds: 45
    duration_max_seconds: 600

# Опційно: перевизначення на лічильник (ID як рядок або число)
# meter_overrides:
#   "5":
#     multiplier: 1.15
#     smoothing_alpha: 0.5
#     emit_every_n_ticks: 2

meter_overrides: {}
